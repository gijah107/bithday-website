<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c060;
    --rose: #ff6b8a;
    --violet: #b57bee;
    --teal: #5de0c0;
    --dark: #0a080f;
    --card: rgba(255,255,255,0.04);
    --glow-gold: 0 0 30px rgba(240,192,96,0.5);
    --glow-rose: 0 0 30px rgba(255,107,138,0.5);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--dark);
    color: #fff;
    overflow-x: hidden;
    cursor: default;
  }

  /* ── STARFIELD ── */
  #stars {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(181,123,238,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(255,107,138,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 60% 80%, rgba(93,224,192,0.05) 0%, transparent 50%);
  }
  .star {
    position: absolute; border-radius: 50%;
    background: white; animation: twinkle var(--d) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100%{opacity:0.1;transform:scale(1)}
    50%{opacity:0.8;transform:scale(1.4)}
  }

  /* ── PAGES ── */
  .page {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10; padding: 2rem;
    transition: opacity 0.8s cubic-bezier(0.4,0,0.2,1), transform 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .page.hidden {
    opacity: 0; pointer-events: none; transform: scale(0.95);
  }

  /* ── PAGE 1 ── */
  .eye-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4.5rem);
    font-weight: 700;
    text-align: center;
    letter-spacing: -0.02em;
    line-height: 1.2;
    background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 50%, var(--violet) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: textGlow 3s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(240,192,96,0.3));
  }
  @keyframes textGlow {
    0%,100%{ filter: drop-shadow(0 0 15px rgba(240,192,96,0.3)); }
    50%{ filter: drop-shadow(0 0 40px rgba(255,107,138,0.6)); }
  }

  .subtitle-p1 {
    margin-top: 1rem;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    animation: fadeUp 1.5s 0.5s both;
  }
  @keyframes fadeUp {
    from{opacity:0;transform:translateY(20px)}
    to{opacity:1;transform:translateY(0)}
  }

  .btn {
    margin-top: 3rem;
    padding: 1rem 2.5rem;
    border: none; border-radius: 100px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1.05rem;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.3s;
    animation: fadeUp 1.5s 1s both;
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, var(--gold), var(--rose), var(--violet));
    z-index: -1;
    transition: opacity 0.3s;
  }
  .btn::after {
    content: '';
    position: absolute; inset: -2px;
    background: linear-gradient(135deg, var(--gold), var(--rose), var(--violet));
    border-radius: 100px; z-index: -2;
    filter: blur(12px); opacity: 0.7;
    transition: opacity 0.3s;
  }
  .btn:hover { transform: translateY(-3px) scale(1.03); }
  .btn:hover::after { opacity: 1; filter: blur(18px); }
  .btn:active { transform: scale(0.97); }
  .btn span { position: relative; z-index: 1; color: var(--dark); font-weight: 600; }

  .floating-emoji {
    position: absolute;
    font-size: 1.5rem;
    animation: float var(--d,6s) ease-in-out infinite;
    opacity: 0.6;
    pointer-events: none;
  }
  @keyframes float {
    0%,100%{transform:translateY(0) rotate(0deg)}
    33%{transform:translateY(-20px) rotate(5deg)}
    66%{transform:translateY(10px) rotate(-5deg)}
  }

  /* ── PAGE 2: TYPING ── */
  #page2 { background: transparent; }
  .typing-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px;
    padding: clamp(2rem, 5vw, 3.5rem);
    max-width: 680px; width: 100%;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 60px rgba(181,123,238,0.1), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: fadeUp 0.8s both;
  }
  .typing-card .tag {
    display: inline-block;
    font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--violet); margin-bottom: 1.5rem;
    border: 1px solid rgba(181,123,238,0.3); border-radius: 100px; padding: 0.3rem 0.9rem;
  }
  #typed-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    line-height: 1.7;
    color: rgba(255,255,255,0.9);
    min-height: 180px;
  }
  .cursor {
    display: inline-block; width: 2px; height: 1.2em;
    background: var(--rose); margin-left: 2px;
    animation: blink 0.7s infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  #next-btn { display: none; }
  #next-btn.show { display: inline-flex; animation: fadeUp 0.6s both; }

  /* ── PAGE 3: GALLERY ── */
  #page3 { overflow-y: auto; justify-content: flex-start; padding: 4rem 2rem; }
  .gallery-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 4vw, 3rem);
    text-align: center;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, var(--gold), var(--rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .gallery-sub {
    text-align: center; color: rgba(255,255,255,0.35);
    font-size: 0.9rem; letter-spacing: 0.15em; text-transform: uppercase;
    margin-bottom: 3rem;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1.2rem;
    max-width: 900px; width: 100%;
    margin: 0 auto;
  }
  .photo-card {
    position: relative;
    border-radius: 18px;
    overflow: hidden;
    aspect-ratio: 4/5;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.4s;
  }
  .photo-card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(240,192,96,0.3);
  }
  .photo-card .photo-inner {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 4rem;
    background: linear-gradient(135deg, var(--bg1), var(--bg2));
    transition: filter 0.4s;
  }
  .photo-card:hover .photo-inner { filter: brightness(1.1); }
  .photo-card .photo-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 1.2rem 1rem 1rem;
    background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, transparent 100%);
    font-size: 0.82rem; color: rgba(255,255,255,0.7);
    transform: translateY(5px); opacity: 0;
    transition: transform 0.3s, opacity 0.3s;
  }
  .photo-card:hover .photo-label { transform: translateY(0); opacity: 1; }
  .photo-card .shine {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
    pointer-events: none;
  }

  .gallery-footer { margin-top: 3rem; text-align: center; width: 100%; }

  /* ── PAGE 4: FINAL ── */
  #page4 { text-align: center; }
  .final-card {
    max-width: 620px; width: 100%;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 28px;
    padding: clamp(2.5rem, 6vw, 4rem);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(255,107,138,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: zoomIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes zoomIn {
    from{opacity:0;transform:scale(0.7)}
    to{opacity:1;transform:scale(1)}
  }
  .heart-burst {
    font-size: 4rem;
    display: block;
    animation: heartbeat 1.2s ease-in-out infinite;
    margin-bottom: 1.5rem;
  }
  @keyframes heartbeat {
    0%,100%{transform:scale(1)}
    15%{transform:scale(1.25)}
    30%{transform:scale(1)}
    45%{transform:scale(1.15)}
    60%{transform:scale(1)}
  }
  .final-msg {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3.5vw, 2rem);
    line-height: 1.65;
    color: rgba(255,255,255,0.92);
    margin-bottom: 2rem;
  }
  .final-msg em {
    font-style: italic;
    background: linear-gradient(135deg, var(--gold), var(--rose));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .final-sig {
    font-size: 0.85rem; letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(255,255,255,0.25);
  }
  .confetti-row { font-size: 1.8rem; letter-spacing: 0.3rem; margin-bottom: 1.5rem; animation: fadeUp 1s 0.5s both; }

  /* hidden surprise btn */
  #surprise-trigger {
    margin-top: 3rem;
    font-size: 0.75rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(255,255,255,0.1);
    background: none; border: 1px solid rgba(255,255,255,0.06);
    border-radius: 100px; padding: 0.5rem 1.2rem;
    cursor: pointer; transition: color 0.4s, border-color 0.4s, box-shadow 0.4s;
  }
  #surprise-trigger:hover {
    color: var(--teal); border-color: var(--teal);
    box-shadow: 0 0 20px rgba(93,224,192,0.25);
  }

  /* ── LIGHTBOX ── */
  #lightbox {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    padding: 2rem;
  }
  #lightbox.open { opacity: 1; pointer-events: auto; }
  #lightbox-inner {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 24px;
    padding: 2.5rem;
    max-width: 500px; width: 100%; text-align: center;
    transform: scale(0.9); transition: transform 0.3s;
    box-shadow: 0 0 60px rgba(240,192,96,0.2);
  }
  #lightbox.open #lightbox-inner { transform: scale(1); }
  #lightbox-emoji { font-size: 5rem; display: block; margin-bottom: 1rem; }
  #lightbox-caption {
    font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 1.1rem; color: rgba(255,255,255,0.8); line-height: 1.6;
  }
  #lightbox-close {
    margin-top: 1.5rem; background: none; border: none;
    color: rgba(255,255,255,0.3); font-size: 0.85rem;
    cursor: pointer; letter-spacing: 0.1em; transition: color 0.2s;
  }
  #lightbox-close:hover { color: rgba(255,255,255,0.8); }

  /* ── MUSIC ── */
  #music-btn {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 50;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
    cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: box-shadow 0.3s, transform 0.2s;
  }
  #music-btn:hover { box-shadow: var(--glow-gold); transform: scale(1.1); }

  /* ── PARTICLES (confetti on final) ── */
  .particle {
    position: fixed; pointer-events: none; z-index: 5;
    border-radius: 2px;
    animation: fall var(--dur) linear forwards;
  }
  @keyframes fall {
    0%{transform:translateY(-10px) rotate(0deg);opacity:1}
    100%{transform:translateY(110vh) rotate(720deg);opacity:0}
  }
</style>
</head>
<body>

<!-- STARS -->
<div id="stars"></div>

<!-- MUSIC (free embed) -->
<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/audio/2022/05/13/audio_1b87b50d28.mp3" type="audio/mpeg">
</audio>
<button id="music-btn" title="Toggle music">🎵</button>

<!-- LIGHTBOX -->
<div id="lightbox">
  <div id="lightbox-inner">
    <span id="lightbox-emoji">🎂</span>
    <p id="lightbox-caption"></p>
    <button id="lightbox-close">Close ✕</button>
  </div>
</div>

<!-- PAGE 1 -->
<div class="page" id="page1">
  <span class="floating-emoji" style="top:15%;left:10%;--d:5s">🎈</span>
  <span class="floating-emoji" style="top:70%;left:85%;--d:7s">✨</span>
  <span class="floating-emoji" style="top:80%;left:12%;--d:4.5s">🎁</span>
  <span class="floating-emoji" style="top:10%;left:80%;--d:6s">🌸</span>
  <span class="floating-emoji" style="top:45%;left:92%;--d:8s">💫</span>

  <h1 class="eye-text">Wait... don't click<br>too fast 👀</h1>
  <p class="subtitle-p1">something special is waiting for you</p>
  <button class="btn" id="readyBtn"><span>Ready ah? 🫶</span></button>
</div>

<!-- PAGE 2 -->
<div class="page hidden" id="page2">
  <div class="typing-card">
    <div class="tag">✦ just for you</div>
    <div id="typed-text"><span class="cursor"></span></div>
    <button class="btn" id="next-btn" style="margin-top:2rem"><span>See the memories ✨</span></button>
  </div>
</div>

<!-- PAGE 3 -->
<div class="page hidden" id="page3">
  <h2 class="gallery-title">Our little universe 🌙</h2>
  <p class="gallery-sub">every photo, a whole feeling</p>

  <div class="gallery-grid" id="galleryGrid"></div>

  <div class="gallery-footer">
    <button class="btn" id="finalBtn" style="margin-top:1rem"><span>One more thing... 💌</span></button>
  </div>
</div>

<!-- PAGE 4 -->
<div class="page hidden" id="page4">
  <div class="final-card">
    <div class="confetti-row">🎂 🎉 🥳 🎊 🎈</div>
    <span class="heart-burst">💖</span>
    <p class="final-msg">
      Happy Birthday, <em>love.</em><br>
      On this day, the world got<br>
      <em>infinitely better</em> — because<br>
      it got <em>you.</em>
    </p>
    <p class="final-sig">– made with every piece of my heart</p>
    <button id="surprise-trigger">psst... there's a secret 🤫</button>
  </div>
</div>

<script>
// ── STARS ──
const starsEl = document.getElementById('stars');
for (let i = 0; i < 120; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px;height:${size}px;
    top:${Math.random()*100}%;left:${Math.random()*100}%;
    --d:${2 + Math.random()*5}s;
    animation-delay:${Math.random()*5}s;
  `;
  starsEl.appendChild(s);
}

// ── MUSIC ──
const music = document.getElementById('bgMusic');
const musicBtn = document.getElementById('music-btn');
let playing = false;
musicBtn.addEventListener('click', () => {
  playing ? music.pause() : music.play().catch(()=>{});
  playing = !playing;
  musicBtn.textContent = playing ? '🔊' : '🎵';
});

// ── PAGE TRANSITIONS ──
function goTo(from, to, delay = 0) {
  setTimeout(() => {
    document.getElementById(from).classList.add('hidden');
    document.getElementById(to).classList.remove('hidden');
  }, delay);
}

// ── PAGE 1 → 2 ──
document.getElementById('readyBtn').addEventListener('click', () => {
  music.play().catch(()=>{});
  playing = true; musicBtn.textContent = '🔊';
  goTo('page1', 'page2');
  setTimeout(startTyping, 500);
});

// ── TYPING ──
const msg = `Today isn't just a birthday —\nit's a celebration of everything\nyou bring to this world.\n\nYour laugh, your chaos, your warmth.\nI wouldn't trade a single moment. 🥺`;

function startTyping() {
  const el = document.getElementById('typed-text');
  el.innerHTML = '<span class="cursor"></span>';
  let i = 0;
  const interval = setInterval(() => {
    if (i >= msg.length) {
      clearInterval(interval);
      document.getElementById('next-btn').classList.add('show');
      return;
    }
    const char = msg[i] === '\n' ? '<br>' : msg[i];
    el.innerHTML = el.innerHTML.replace('<span class="cursor"></span>', '') + char + '<span class="cursor"></span>';
    i++;
  }, 38);
}

// ── PAGE 2 → 3 ──
document.getElementById('next-btn').addEventListener('click', () => {
  goTo('page2', 'page3');
  buildGallery();
});

// ── GALLERY DATA ──
const photos = [
  { emoji:'🌅', label:'That morning we watched the sunrise', bg1:'#1a0a2e', bg2:'#3d1a6b', caption:'The sky turned pink just for us. I think it knew.' },
  { emoji:'🍜', label:'Midnight noodles at 2am', bg1:'#0a1a1a', bg2:'#0d3d3d', caption:'The best meals are the ones that weren\'t planned.' },
  { emoji:'🎭', label:'Ugly laughing — our signature', bg1:'#1a0a10', bg2:'#4d0a25', caption:'You laugh with your whole soul. It\'s my favourite sound.' },
  { emoji:'🌊', label:'That beach trip we almost missed', bg1:'#0a1020', bg2:'#0d2040', caption:'Almost missed it. Almost. But we didn\'t — and that\'s everything.' },
  { emoji:'📚', label:'Study sessions that turned into chaos', bg1:'#151010', bg2:'#302010', caption:'We never actually studied. And I regret nothing.' },
  { emoji:'🌙', label:'3am conversations about life', bg1:'#080815', bg2:'#151530', caption:'The universe makes sense when I talk to you.' },
  { emoji:'🎂', label:'Every birthday before this one', bg1:'#1a0a05', bg2:'#3d1800', caption:'Getting to celebrate you is the best tradition.' },
  { emoji:'🤝', label:'The day we decided — forever', bg1:'#050a10', bg2:'#0a2030', caption:'No words needed. We just knew.' },
];

function buildGallery() {
  const grid = document.getElementById('galleryGrid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';
    card.style.setProperty('--bg1', p.bg1);
    card.style.setProperty('--bg2', p.bg2);
    card.style.animationDelay = `${i * 0.08}s`;
    card.style.animation = `fadeUp 0.6s ${i * 0.08}s both`;
    card.innerHTML = `
      <div class="photo-inner" style="background:linear-gradient(135deg,${p.bg1},${p.bg2})">
        <span>${p.emoji}</span>
      </div>
      <div class="shine"></div>
      <div class="photo-label">${p.label}</div>
    `;
    card.addEventListener('click', () => openLightbox(p));
    grid.appendChild(card);
  });
}

// ── LIGHTBOX ──
function openLightbox(p) {
  document.getElementById('lightbox-emoji').textContent = p.emoji;
  document.getElementById('lightbox-caption').textContent = p.caption;
  document.getElementById('lightbox').classList.add('open');
}
document.getElementById('lightbox-close').addEventListener('click', () => {
  document.getElementById('lightbox').classList.remove('open');
});
document.getElementById('lightbox').addEventListener('click', (e) => {
  if (e.target === document.getElementById('lightbox'))
    document.getElementById('lightbox').classList.remove('open');
});

// ── PAGE 3 → 4 ──
document.getElementById('finalBtn').addEventListener('click', () => {
  goTo('page3', 'page4');
  launchConfetti();
});

// ── CONFETTI ──
function launchConfetti() {
  const colors = ['#f0c060','#ff6b8a','#b57bee','#5de0c0','#fff'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left:${Math.random()*100}vw;
        top:-10px;
        width:${4+Math.random()*6}px;
        height:${8+Math.random()*8}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        --dur:${2+Math.random()*3}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};
        opacity:0.9;
      `;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 5000);
    }, i * 30);
  }
}

// ── HIDDEN SURPRISE ──
document.getElementById('surprise-trigger').addEventListener('click', () => {
  const secrets = [
    { e:'🌟', t:'You are, without question, the best thing that ever happened to me. Not just today — always.' },
    { e:'💌', t:'I wrote this because words in a card feel small. But I hope this felt bigger. Happy Birthday.' },
    { e:'🎆', t:'The world doesn\'t deserve you. But it has you anyway — and we are all so lucky.' },
  ];
  const s = secrets[Math.floor(Math.random()*secrets.length)];
  document.getElementById('lightbox-emoji').textContent = s.e;
  document.getElementById('lightbox-caption').textContent = s.t;
  document.getElementById('lightbox').classList.add('open');
  launchConfetti();
});
</script>
</body>
</html>
